appId: com.datanoisetv.dsplab
productName: DSPLab
copyright: Copyright © 2026 syso (DatanoiseTV)

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron-dist/**/*
  - package.json

extraResources:
  # Bridge file — all paths are relative to __dirname (where this file lives)
  - from: vult-compiler-bridge.cjs
    to: compiler/vult-compiler-bridge.cjs
  # Compiler modules — bridge requires ./public/vultweb.cjs
  - from: public/vultweb.cjs
    to: compiler/public/vultweb.cjs
  - from: public/v1-vultweb.cjs
    to: compiler/public/v1-vultweb.cjs
  # vultc — bridge looks for ./node_modules/.bin/vultc
  - from: node_modules/vult/vultc.js
    to: compiler/node_modules/.bin/vultc
  # Runtime headers — bridge looks for ./vult-runtime/
  - from: vult-runtime/
    to: compiler/vult-runtime/

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  maintainer: syso (DatanoiseTV)
